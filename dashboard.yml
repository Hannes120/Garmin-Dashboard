name: Training Dashboard

on:
  schedule:
    # Every 30 min from 03:00–09:30 UTC (= 05:00–11:30 CEST)
    # Covers sleeping in until ~11:00, and early risers at ~05:50
    - cron: "0,30 3,4,5,6,7,8,9 * * *"
    # Also at 03:30 UTC (= 05:30 CEST) as main weekday target
    - cron: "30 3 * * 1-5"
  workflow_dispatch:   # manual trigger for testing

# Don't let overlapping cron runs clobber each other's caches.
concurrency:
  group: training-dashboard
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore sent-state cache
        uses: actions/cache@v4
        with:
          path: /tmp/dashboard_sent_date.txt
          key: dashboard-sent-${{ github.run_id }}
          restore-keys: |
            dashboard-sent-

      - name: Restore Garmin token cache
        uses: actions/cache@v4
        with:
          path: /tmp/garmin_tokens
          key: garmin-tokens-${{ github.run_id }}
          restore-keys: |
            garmin-tokens-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run dashboard
        env:
          GARMIN_EMAIL:       ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD:    ${{ secrets.GARMIN_PASSWORD }}
          GARM_TOKENS_DIR:    /tmp/garmin_tokens
          CLAUDE_API_KEY:     ${{ secrets.CLAUDE_API_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO:           ${{ secrets.GMAIL_TO }}
          DASHBOARD_TZ:       Europe/Berlin
        run: python garmin_daily.py

      - name: Save sent-state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /tmp/dashboard_sent_date.txt
          key: dashboard-sent-${{ github.run_id }}

      - name: Save Garmin token cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /tmp/garmin_tokens
          key: garmin-tokens-${{ github.run_id }}

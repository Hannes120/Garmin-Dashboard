name: Daily Garmin Dashboard

on:
  schedule:
    # Startet täglich um 04:00 CEST (02:00 UTC)
    # Skript wartet dann bis zu 4h auf Sleep Score
    # → E-Mail ~10min nach dem Aufwachen, auch bei Aufstehen um 09:00
    - cron: '0 2 * * *'

  workflow_dispatch:

jobs:
  generate-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6h — Platz für 4h Polling + Verarbeitung

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python 3.11 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Dashboard generieren & senden
        env:
          GARMIN_EMAIL:       ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD:    ${{ secrets.GARMIN_PASSWORD }}
          CLAUDE_API_KEY:     ${{ secrets.CLAUDE_API_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO:           ${{ secrets.GMAIL_TO }}
        run: python garmin_daily.py

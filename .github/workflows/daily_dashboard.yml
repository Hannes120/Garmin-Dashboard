name: Daily Garmin Dashboard

on:
  schedule:
    # Startet täglich um 05:00 CEST (03:00 UTC)
    # Skript wartet dann intern bis Sleep Score verfügbar ist (max 90 min)
    # → E-Mail kommt ~10 min nach deinem Aufwachen, egal wann das ist
    - cron: '0 3 * * *'

  # Manueller Start für Tests
  workflow_dispatch:

jobs:
  generate-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 2h — Platz für Sleep-Polling + Verarbeitung

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python 3.11 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # Kein pip-Cache — stellt sicher dass immer frische Version geladen wird

      - name: Abhängigkeiten installieren
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Dashboard generieren & per E-Mail senden
        env:
          GARMIN_EMAIL:       ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD:    ${{ secrets.GARMIN_PASSWORD }}
          CLAUDE_API_KEY:     ${{ secrets.CLAUDE_API_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO:           ${{ secrets.GMAIL_TO }}
        run: python garmin_daily.py
